<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thử Nghiệm GitHub Pages</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: #333;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
      }

      .container {
        background: rgba(255, 255, 255, 0.95);
        padding: 40px;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        text-align: center;
        max-width: 500px;
        width: 100%;
        transition: transform 0.3s ease;
      }

      .container:hover {
        transform: translateY(-5px);
      }

      .icon {
        font-size: 50px;
        margin-bottom: 20px;
        animation: bounce 2s infinite;
      }

      h1 {
        color: #4a148c;
        margin-bottom: 15px;
        font-size: 28px;
      }

      p {
        color: #666;
        line-height: 1.6;
        margin-bottom: 25px;
      }

      .status-badge {
        display: inline-block;
        background-color: #2ed573;
        color: white;
        padding: 6px 16px;
        border-radius: 20px;
        font-weight: bold;
        font-size: 14px;
        margin-bottom: 25px;
        box-shadow: 0 4px 10px rgba(46, 213, 115, 0.3);
      }

      .btn {
        display: inline-block;
        background: #764ba2;
        color: white;
        border: none;
        padding: 12px 30px;
        font-size: 16px;
        font-weight: 600;
        border-radius: 8px;
        cursor: pointer;
        text-decoration: none;
        transition: all 0.3s ease;
        box-shadow: 0 4px 15px rgba(118, 75, 162, 0.4);
      }

      .btn:hover {
        background: #667eea;
        box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
      }

      .footer {
        margin-top: 30px;
        font-size: 12px;
        color: #999;
      }

      @keyframes bounce {
        0%,
        20%,
        50%,
        80%,
        100% {
          transform: translateY(0);
        }
        40% {
          transform: translateY(-15px);
        }
        60% {
          transform: translateY(-7px);
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon">🚀</div>
      <h1>Chúc Mừng Bạn!</h1>
      <div class="status-badge">Trang web hoạt động tốt</div>
      <p>
        Nếu bạn nhìn thấy giao diện này, điều đó có nghĩa là file HTML của bạn
        đã được tải lên và cấu hình thành công trên GitHub Pages.
      </p>

      <!-- Nút bấm tương tác thử nghiệm Javascript cơ bản -->
      <button class="btn" onclick="testClick()">Bấm thử vào tôi</button>

      <div class="footer">
        Trang web thử nghiệm được tạo tự động • GitHub Pages Test
      </div>
    </div>

    <script>
      function testClick() {
        alert(
          "Tuyệt vời! JavaScript trên trang web của bạn cũng đang hoạt động bình thường luôn nhé! 🎉",
        );
      }
    </script>
  </body>
</html>
